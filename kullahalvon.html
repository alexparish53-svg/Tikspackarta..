<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kullahalvön - Status</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>

<header class="map-header">
    <h1>Tikspac stationer på Kullahalvön</h1>
</header>

<div style="text-align: left; padding-left: 30px;">
    <a href="index.html" class="back-link">⬅ Tillbaka till menyn</a>
</div>

<div class="map-container fade-in">
    <div id="legend">
        <h3>Status</h3>
        <div class="item">
            <img src="images/green.png" alt="Grön">
            <span><b>Grön markör:</b><br>Här finns det påsar kvar!</span>
        </div>
        <div class="item">
            <img src="images/red.png" alt="Röd">
            <span><b>Röd markör:</b><br>Påsar slut. Påfyllning på väg.</span>
        </div>
    </div>

    <div id="map"></div>

    <div id="side-info">
        <img src="images/tikspac.png" alt="Tikspac Station">
        <p><b>Tikspac-station</b><br>Håll utkik efter dessa stolpar längs promenadstråken för att hämta din påse.</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="station.js"></script>

<script>
    // Mobilvänliga inställningar:
    var map = L.map('map', {
        tap: false, 
        scrollWheelZoom: false,
        dragging: true,
        touchZoom: true
    }).setView([56.25, 12.60], 11);
    
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap',
        crossOrigin: true
    }).addTo(map);

    var greenIcon = L.icon({ iconUrl: 'images/green.png', iconSize: [30,40], iconAnchor: [15, 40] });
    var redIcon   = L.icon({ iconUrl: 'images/red.png',   iconSize: [30,40], iconAnchor: [15, 40] });

    var markorer = {};

    function ritaKarta() {
        stationer.forEach(station => {
            var ikon = station.status === "aktiv" ? greenIcon : redIcon;
            markorer[station.namn] = L.marker([station.lat, station.lon], { icon: ikon })
                .addTo(map)
                .bindPopup("<b>" + station.namn + "</b><br>Status: " + (station.status === "aktiv" ? "Finns påsar" : "Slut"));
        });
    }

    ritaKarta();

    // Din ESP32 IP-adress
    const esp32_ip = "http://172.20.10.2";

    function hamtaSensorData() {
        fetch(esp32_ip)
            .then(response => response.text())
            .then(distance => {
                const dist = parseInt(distance);
                
                // Ändrat tillbaka till Kulturhuset
                const stationNamn = "Kulturhuset"; 
                
                let nyStatus = (dist < 20) ? "aktiv" : "inaktiv";
                
                if (markorer[stationNamn]) {
                    let nyIkon = (nyStatus === "aktiv") ? greenIcon : redIcon;
                    markorer[stationNamn].setIcon(nyIkon);
                    markorer[stationNamn].getPopup().setContent("<b>" + stationNamn + "</b><br>Status: " + (nyStatus === "aktiv" ? "Finns påsar" : "Slut"));
                }
                console.log("Avstånd från sensor: " + dist + " cm");
            })
            .catch(err => console.log("Kunde inte nå sensorn just nu..."));
    }

    // Uppdatera varannan sekund
    setInterval(hamtaSensorData, 2000);
</script>
</body>
</html>
